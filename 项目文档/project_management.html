<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1mod 项目管理</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #687386;
      --line: #dde3ee;
      --brand: #176b87;
      --brand-soft: #e7f4f7;
      --accent: #c9792b;
      --shadow: 0 12px 30px rgba(24, 37, 56, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 16px;
      background: #101827;
      color: #f6f8fb;
      overflow-y: auto;
    }

    .brand {
      padding: 8px 8px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      margin-bottom: 14px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 750;
    }

    .brand p {
      margin: 8px 0 0;
      color: #bac5d6;
      font-size: 13px;
      line-height: 1.6;
    }

    .nav-button {
      width: 100%;
      min-height: 44px;
      margin: 4px 0;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #dbe3ef;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .nav-button.active {
      background: var(--brand-soft);
      color: #0f3443;
      font-weight: 700;
    }

    main {
      padding: 28px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .topbar p {
      max-width: 720px;
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font: inherit;
    }

    .action-button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .subsection-title {
      margin: 24px 0 10px;
      font-size: 18px;
      line-height: 1.4;
    }

    .subsection-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .subsection-title {
      margin: 24px 0 10px;
      font-size: 18px;
      line-height: 1.4;
    }

    .subsection-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 12px;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef3f8;
      color: #263247;
      font-weight: 700;
      text-align: left;
    }

    td[contenteditable="true"] {
      background: #ffffff;
      outline: none;
    }

    td[contenteditable="true"]:focus {
      background: #fff8ec;
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      min-height: 22px;
      color: var(--brand);
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      main {
        padding: 18px;
      }

      .topbar {
        display: block;
      }

      .actions {
        justify-content: flex-start;
        margin-top: 14px;
      }
    }
  </style>
</head>

          <button class="action-button" id="resetButton" type="button">恢复默认</button>
          <button class="action-button primary" id="exportButton" type="button">导出只读 HTML</button>
        </div>
      </div>

      <div id="sections"></div>
      <div class="hint">提示：点击表格内容即可编辑。修改会自动保存在当前浏览器中。</div>
      <div class="status" id="status"></div>
    </main>

          ["发布检查清单", "发布或演示前确认准备情况", "区域、要求、负责人、状态、证据/链接", "每次发布或演示前", "项目负责人/测试负责人", "小规模发布也很有用"]

          ["第 1 周", "清晰定义项目", "草拟 MVP 范围", "待定", "必须做和以后再做的清单", "未开始"]
        ]
      },

        headers: ["日期", "决策", "背景", "考虑过的选项", "理由", "负责人"],
        rows: [
          ["YYYY-MM-DD", "待定", "待定", "待定", "待定", "待定"]
        ]
      },
      {
        id: "risks",
        title: "风险登记表",
        description: "提前看见可能影响范围、时间、质量和可行性的风险。",
        headers: ["编号", "风险", "影响", "概率", "缓解措施", "负责人", "状态"],
        rows: [
          ["R-001", "项目范围变得过宽", "高", "中", "定义 MVP 范围，并用它审查所有新增想法", "待定", "开放"],
          ["R-002", "核心用户需求不清晰", "高", "中", "先编写用户场景，避免在验证前投入过多开发", "待定", "开放"],
          ["R-003", "技术方向后期发生变化", "中", "中", "尽早记录架构决策，只有在有明确证据时才调整", "待定", "开放"]
        ]
      }
    ];

    let data = loadData();
    let activeId = data[0].id;

    const nav = document.getElementById("nav");
    const sections = document.getElementById("sections");
    const pageTitle = document.getElementById("pageTitle");
    const pageDescription = document.getElementById("pageDescription");
    const addMonthButton = document.getElementById("addMonthButton");
    const status = document.getElementById("status");

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return structuredClone(defaultData);
      try {
        return mergeWithDefaults(JSON.parse(saved));
      } catch {
        return structuredClone(defaultData);
      }
    }

    function mergeWithDefaults(savedData) {
      if (!Array.isArray(savedData)) return structuredClone(defaultData);

      const merged = savedData.map((section) => ({ ...section }));
      defaultData.forEach((defaultSection) => {
        const existing = merged.find((section) => section.id === defaultSection.id);
        if (!existing) {
          merged.push(structuredClone(defaultSection));
          return;
        }

        if (existing.id === "milestones" && !existing.monthPlans) {
          existing.monthPlans = structuredClone(defaultSection.monthPlans);
        }

        if (existing.id === "tools") {
          defaultSection.rows.forEach((defaultRow) => {
            const toolName = defaultRow[0];
            const hasTool = existing.rows.some((row) => row[0] === toolName);
            if (!hasTool) existing.rows.push([...defaultRow]);
          });
        }
      });

      return merged;
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      status.textContent = "已自动保存";
      clearTimeout(window.statusTimer);
      window.statusTimer = setTimeout(() => {
        status.textContent = "";
      }, 1400);
    }

    function render() {
      nav.innerHTML = "";
      sections.innerHTML = "";

      data.forEach((section) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "nav-button";
        button.textContent = section.title;
        button.dataset.id = section.id;
        button.addEventListener("click", () => switchSection(section.id));
        nav.appendChild(button);

        const block = document.createElement("section");
        block.className = "section";
        block.dataset.id = section.id;

        block.appendChild(createEditableTable(section.headers, section.rows, (rowIndex, cellIndex, value) => {
          data.find((item) => item.id === section.id).rows[rowIndex][cellIndex] = value;
          saveData();
        }));

        if (section.id === "milestones" && section.monthPlans) {
          renderMonthPlans(block, section);
        }

        sections.appendChild(block);
      });

      switchSection(activeId);
    }

    function createEditableTable(headers, rows, onChange) {
      const tableWrap = document.createElement("div");
      tableWrap.className = "table-wrap";

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      rows.forEach((row, rowIndex) => {
        const tr = document.createElement("tr");
        headers.forEach((_, cellIndex) => {
          const td = document.createElement("td");
          td.contentEditable = "true";
          td.textContent = row[cellIndex] || "";
          td.addEventListener("input", () => onChange(rowIndex, cellIndex, td.textContent));
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableWrap.appendChild(table);

      return tableWrap;
    }

    function renderMonthPlans(block, section) {
      const title = document.createElement("h3");
      title.className = "subsection-title";
      title.textContent = section.monthPlans.title;
      block.appendChild(title);

      const note = document.createElement("p");
      note.className = "subsection-note";
      note.textContent = "从 2026年7月 开始按月拆解里程碑。点击右上角“新增月份”可继续追加下一个月份。";
      block.appendChild(note);

      block.appendChild(createEditableTable(section.monthPlans.headers, section.monthPlans.rows, (rowIndex, cellIndex, value) => {
        data.find((item) => item.id === section.id).monthPlans.rows[rowIndex][cellIndex] = value;
        saveData();
      }));
    }

    function switchSection(id) {
      activeId = id;
      const section = data.find((item) => item.id === id);
      pageTitle.textContent = section.title;
      pageDescription.textContent = section.description;
      document.querySelectorAll(".nav-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.id === id);
      });
      document.querySelectorAll(".section").forEach((block) => {
        block.classList.toggle("active", block.dataset.id === id);
      });
      addMonthButton.style.display = id === "milestones" ? "inline-block" : "none";
    }

    document.getElementById("addRowButton").addEventListener("click", () => {
      const section = data.find((item) => item.id === activeId);
      section.rows.push(section.headers.map(() => ""));
      saveData();
      render();
    });

    addMonthButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "milestones");
      if (!section.monthPlans) return;
      section.monthPlans.rows.push(createNextMonthPlanRow(section.monthPlans.rows));
      saveData();
      render();
      switchSection("milestones");
    });

    function createNextMonthPlanRow(rows) {
      const monthText = getNextMonthText(rows);
      return [monthText, "填写本月目标", "关联里程碑编号", "填写本月重点任务", "填写预期成果", "待定", "未开始", ""];
    }

    function getNextMonthText(rows) {
      const lastMonth = [...rows].reverse().map((row) => parseMonthText(row[0])).find(Boolean);
      const base = lastMonth || { year: 2026, month: 6 };
      const date = new Date(base.year, base.month, 1);
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function parseMonthText(value) {
      const match = String(value || "").match(/(\d{4})年(\d{1,2})月/);
      if (!match) return null;
      return { year: Number(match[1]), month: Number(match[2]) };
    }

    document.getElementById("resetButton").addEventListener("click", () => {
      if (!confirm("确认恢复默认内容？当前浏览器保存的修改会被清除。")) return;
      data = structuredClone(defaultData);
      localStorage.removeItem(STORAGE_KEY);
      activeId = data[0].id;
      render();
      status.textContent = "已恢复默认内容";
    });
