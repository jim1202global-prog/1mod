<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1mod 项目管理</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #687386;
      --line: #dde3ee;
      --brand: #176b87;
      --brand-soft: #e7f4f7;
      --accent: #c9792b;
      --shadow: 0 12px 30px rgba(24, 37, 56, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 16px;
      background: #101827;
      color: #f6f8fb;
      overflow-y: auto;
    }

    .brand {
      padding: 8px 8px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      margin-bottom: 14px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 750;
    }

    .brand p {
      margin: 8px 0 0;
      color: #bac5d6;
      font-size: 13px;
      line-height: 1.6;
    }

    .nav-button {
      width: 100%;
      min-height: 44px;
      margin: 4px 0;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #dbe3ef;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .nav-button.active {
      background: var(--brand-soft);
      color: #0f3443;
      font-weight: 700;
    }

    main {
      padding: 28px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .topbar p {
      max-width: 720px;
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font: inherit;
    }

    .action-button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .executive-strip,
    .month-timeline {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .executive-strip {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .summary-item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .summary-kicker,
    .timeline-month {
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .summary-title,
    .timeline-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 6px;
    }

    .summary-text,
    .timeline-text {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .month-timeline {
      position: relative;
      display: block;
      padding: 4px 0 6px 24px;
      margin-bottom: 20px;
    }

    .month-timeline::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 10px;
      bottom: 16px;
      width: 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--brand), var(--accent));
    }

    .timeline-item {
      position: relative;
      display: grid;
      grid-template-columns: minmax(92px, 140px) 1fr;
      gap: 14px;
      padding: 0 0 16px 18px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 8px;
      width: 12px;
      height: 12px;
      border: 3px solid #ffffff;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.18);
    }

    .timeline-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .timeline-meta {
      align-self: start;
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      padding-top: 8px;
    }

    .timeline-status {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: #0f3443;
      font-size: 12px;
      font-weight: 700;
    }

    .filter-select {
      width: 28px;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      padding: 0;
      cursor: pointer;
    }

    .table-filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .table-filter-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .okr-board {
      display: grid;
      gap: 16px;
    }

    .okr-month {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .okr-month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: #eef3f8;
    }

    .okr-month-title {
      color: #263247;
      font-size: 16px;
      font-weight: 800;
      flex: 1;
    }

    .okr-toggle {
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--brand);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
    }

    .row-delete-cell {
      width: 96px;
      min-width: 96px;
      text-align: center;
    }

    .row-delete-button {
      min-height: 30px;
      padding: 5px 8px;
      border: 1px solid #e0b4b4;
      border-radius: 6px;
      background: #fff5f5;
      color: #9f2d2d;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .row-delete-button:hover {
      background: #ffe7e7;
    }

    .okr-objective {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
    }

    .okr-objective-title {
      margin-bottom: 10px;
      color: var(--brand);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.5;
    }

    .okr-kr-list {
      display: grid;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .okr-kr-header,
    .okr-kr-row {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) minmax(160px, 0.9fr) repeat(4, minmax(90px, 0.7fr));
      align-items: stretch;
    }

    .okr-board .okr-kr-header,
    .okr-board .okr-kr-row {
      grid-template-columns: minmax(220px, 1.4fr) minmax(160px, 0.9fr) repeat(4, minmax(90px, 0.7fr)) minmax(92px, 0.45fr);
    }

    .okr-kr-header {
      background: #f3f6fa;
      color: #4a5668;
      font-size: 12px;
      font-weight: 800;
    }

    .okr-kr-header div,
    .okr-kr-row > div {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .okr-kr-header div:last-child,
    .okr-kr-row > div:last-child {
      border-right: 0;
    }

    .okr-kr-row:last-child > div {
      border-bottom: 0;
    }

    .okr-kr-header div {
      padding: 9px 10px;
    }

    .okr-kr-row {
      background: #fbfcfe;
    }

    .okr-cell {
      min-height: 34px;
      padding: 7px 8px;
      border: 1px solid transparent;
      border-radius: 0;
      font-size: 13px;
      line-height: 1.45;
      background: #ffffff;
      word-break: break-word;
    }

    .okr-cell:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff8ec;
    }

    .weekly-board {
      display: grid;
      gap: 16px;
    }

    .weekly-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .weekly-header {
      display: grid;
      grid-template-columns: minmax(120px, 0.6fr) minmax(220px, 1.4fr);
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: #eef3f8;
      border-bottom: 1px solid var(--line);
    }

    .weekly-title {
      color: var(--brand);
      font-size: 16px;
      font-weight: 800;
    }

    .weekly-goal {
      color: #263247;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .weekly-table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .weekly-cell {
      min-height: 34px;
      padding: 7px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: #ffffff;
      line-height: 1.45;
      word-break: break-word;
    }

    .weekly-cell:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff8ec;
    }

    .subsection-title {
      margin: 24px 0 10px;
      font-size: 18px;
      line-height: 1.4;
    }

    .subsection-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .subsection-title {
      margin: 24px 0 10px;
      font-size: 18px;
      line-height: 1.4;
    }

    .subsection-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 12px;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef3f8;
      color: #263247;
      font-weight: 700;
      text-align: left;
    }

    td[contenteditable="true"] {
      background: #ffffff;
      outline: none;
      white-space: pre-wrap;
    }

    td[contenteditable="true"]:focus {
      background: #fff8ec;
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .cell-select {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      padding: 6px 8px;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      min-height: 22px;
      color: var(--brand);
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      main {
        padding: 18px;
      }

      .topbar {
        display: block;
      }

      .actions {
        justify-content: flex-start;
        margin-top: 14px;
      }
    }
  </style>
</head>

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return orderSections(structuredClone(defaultData));
      try {
        return mergeWithDefaults(JSON.parse(saved));
      } catch {
        return orderSections(structuredClone(defaultData));
      }
    }

    function mergeWithDefaults(savedData) {
      if (!Array.isArray(savedData)) return structuredClone(defaultData);

      const merged = savedData.map((section) => ({ ...section }));
      defaultData.forEach((defaultSection) => {
        const existing = merged.find((section) => section.id === defaultSection.id);
        if (!existing) {
          merged.push(structuredClone(defaultSection));
          return;
        }
        existing.title = defaultSection.title;
        existing.description = defaultSection.description;

        if (existing.id === "roadmap") {
          if (existing.headers.includes("老板关注点") || existing.headers.includes("负责人")) {
            existing.rows = normalizeRoadmapRows(existing);
            existing.headers = [...defaultSection.headers];
          }

          const oldMilestones = merged.find((section) => section.id === "milestones");
          if (oldMilestones?.rows?.length) {
            existing.headers = [...defaultSection.headers];
            existing.rows = oldMilestones.rows.map((row) => [
              row[0] || "",
              row[2] || "",
              row[1] || "",
              row[3] || "",
              row[4] || "",
              row[6] || "未开始",
              row[7] || ""
            ]);
          } else if (existing.headers.includes("关键交付物") || existing.headers.includes("时间范围")) {
            existing.headers = [...defaultSection.headers];
            existing.rows = defaultSection.rows.map((row) => [...row]);
          }
        }

        if (existing.id === "backlog") {
          if (existing.backlogRevision !== BACKLOG_REVISION) {
            existing.headers = [...defaultSection.headers];
            existing.rows = defaultSection.rows.map((row) => [...row]);
            existing.backlogRevision = BACKLOG_REVISION;
          }

          const workloadIndex = existing.headers.indexOf("工作量");
          if (workloadIndex !== -1) {
            existing.headers.splice(workloadIndex, 1);
            existing.rows = existing.rows.map((row) => {
              const nextRow = [...row];
              nextRow.splice(workloadIndex, 1);
              return nextRow;
            });
          }

          const categoryIndex = existing.headers.indexOf("类别");
          if (categoryIndex !== -1) {
            existing.headers = [...defaultSection.headers];
            existing.rows = existing.rows.map((row) => {
              const moduleName = row[categoryIndex] || "";
              return [
                row[0] || "",
                inferBacklogOwnership(moduleName),
                moduleName,
                row[2] || "",
                row[3] || "",
                row[4] || "",
                row[5] || "",
                row[6] || "未开始",
                row[7] || ""
              ];
            });
          }

          if (!existing.headers.includes("模块")) {
            existing.headers = [...defaultSection.headers];
            existing.rows = defaultSection.rows.map((row) => [...row]);
          }

          defaultSection.rows.forEach((defaultRow) => {
            const hasRow = existing.rows.some((row) => row[0] === defaultRow[0]);
            if (!hasRow) existing.rows.push([...defaultRow]);
          });
        }

        if (existing.id === "weekly") {
          if (existing.weeklyRevision !== WEEKLY_REVISION) {
            existing.headers = [...defaultSection.headers];
            existing.rows = defaultSection.rows.map((row) => [...row]);
            existing.weeklyRevision = WEEKLY_REVISION;
          } else {
            existing.rows = normalizeWeeklyRows(existing);
            existing.headers = [...defaultSection.headers];
            defaultSection.rows.forEach((defaultRow) => {
              const hasRow = existing.rows.some((row) => row[0] === defaultRow[0] && row[3] === defaultRow[3]);
              if (!hasRow) existing.rows.push([...defaultRow]);
            });
          }
        }

        if (existing.id === "risks") {
          const hasOldRiskFields = existing.headers.includes("影响") || existing.headers.includes("概率") || existing.headers.includes("状态");
          if (hasOldRiskFields) {
            existing.headers = [...defaultSection.headers];
            existing.rows = defaultSection.rows.map((row) => [...row]);
          }
        }

        if (existing.id === "monthly-okr" && existing.headers.includes("当前值")) {
          existing.headers = [...defaultSection.headers];
          existing.rows = existing.rows.map((row) => [
            row[0] || "",
            row[1] || "",
            row[2] || "",
            row[3] || "",
            row[6] || "待定",
            "0%",
            row[7] || "0%",
            row[9] || ""
          ]);
        }

        if (existing.id === "monthly-okr") {
          existing.rows = removeLegacyOkrSummaryRows(existing.rows);
          const hasOldPlaceholder = existing.rows.some((row) => String(row[0] || "").includes("第 1 月"));
          if (hasOldPlaceholder || existing.okrRevision !== OKR_REVISION) {
            existing.headers = [...defaultSection.headers];
            existing.rows = defaultSection.rows.map((row) => [...row]);
            existing.okrRevision = OKR_REVISION;
          } else {
            defaultSection.rows.forEach((defaultRow) => {
              const hasRow = existing.rows.some((row) => row[0] === defaultRow[0] && row[1] === defaultRow[1] && row[2] === defaultRow[2]);
              if (!hasRow) existing.rows.push([...defaultRow]);
            });
          }
        }

        if (existing.id === "decisions" && existing.rows.length === 1 && existing.rows[0][0] === "YYYY-MM-DD") {
          existing.rows = defaultSection.rows.map((row) => [...row]);
        }

        if (existing.id === "decisions") {
          defaultSection.rows.forEach((defaultRow) => {
            const hasRow = existing.rows.some((row) => row[0] === defaultRow[0] && row[1] === defaultRow[1]);
            if (!hasRow) existing.rows.push([...defaultRow]);
          });
        }

        if (existing.id === "tools") {
          existing.rows.forEach((row) => {
            if (row[0] === "每周计划") row[0] = "每周重点";
          });
          defaultSection.rows.forEach((defaultRow) => {
            const toolName = defaultRow[0];
            const existingRow = existing.rows.find((row) => row[0] === toolName);
            if (existingRow && ["路线图", "待办事项", "每周重点"].includes(toolName)) {
              existing.rows[existing.rows.indexOf(existingRow)] = [...defaultRow];
            } else if (!existingRow) {
              existing.rows.push([...defaultRow]);
            }
          });
          existing.rows = existing.rows.filter((row) => row[0] !== "里程碑计划");
          existing.rows = existing.rows.filter((row) => row[0] !== "待办事项池");
        }
      });

      return orderSections(merged.filter((section) => section.id !== "milestones"));
    }

    function orderSections(sections) {
      return [...sections].sort((a, b) => {
        const orderA = SECTION_ORDER.indexOf(a.id);
        const orderB = SECTION_ORDER.indexOf(b.id);
        const safeA = orderA === -1 ? SECTION_ORDER.length : orderA;
        const safeB = orderB === -1 ? SECTION_ORDER.length : orderB;
        return safeA - safeB;
      });
    }

    function buildDefaultDataLiteral(sourceData) {
      return JSON.stringify(sourceData, null, 6).replace(/<\/script/gi, "<\\/script");
    }

    function findDefaultDataRange(html) {
      const marker = "const defaultData =";
      const markerIndex = html.indexOf(marker);
      if (markerIndex === -1) throw new Error("没有找到 defaultData 数据区。");

      const arrayStart = html.indexOf("[", markerIndex);
      if (arrayStart === -1) throw new Error("没有找到 defaultData 起始位置。");

      let depth = 0;
      let inString = false;
      let quote = "";
      let escaped = false;

      for (let index = arrayStart; index < html.length; index += 1) {
        const char = html[index];

        if (inString) {
          if (escaped) {
            escaped = false;
          } else if (char === "\\") {
            escaped = true;
          } else if (char === quote) {
            inString = false;
          }
          continue;
        }

        if (char === '"' || char === "'") {
          inString = true;
          quote = char;
          continue;
        }

        if (char === "[") depth += 1;
        if (char === "]") {
          depth -= 1;
          if (depth === 0) {
            return { start: arrayStart, end: index + 1 };
          }
        }
      }

      throw new Error("没有找到 defaultData 结束位置。");
    }

    function embedDataInHtml(html, sourceData) {
      const range = findDefaultDataRange(html);
      return `${html.slice(0, range.start)}${buildDefaultDataLiteral(sourceData)}${html.slice(range.end)}`;
    }

    function createEditableHtml(exportData) {
      return embedDataInHtml(document.documentElement.outerHTML, exportData);
    }

    function createVersionFileName(date = new Date()) {
      const pad = (value) => String(value).padStart(2, "0");
      return [
        "project_management",
        `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`,
        `${pad(date.getHours())}-${pad(date.getMinutes())}-${pad(date.getSeconds())}`
      ].join("_") + ".html";
    }

    function isVersionFileName(name) {
      return /^project_management_\d{4}-\d{2}-\d{2}_\d{2}-\d{2}-\d{2}\.html$/.test(name);
    }

    function parseEmbeddedData(html) {
      const range = findDefaultDataRange(html);
      return orderSections(JSON.parse(html.slice(range.start, range.end)));
    }

    function openHandleStore() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("one_mod_project_management_handles", 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore("handles");
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveStoredHandle(key, handle) {
      const db = await openHandleStore();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction("handles", "readwrite");
        transaction.objectStore("handles").put(handle, key);
        transaction.oncomplete = () => resolve();
        transaction.onerror = () => reject(transaction.error);
      });
    }

    async function getStoredHandle(key) {
      const db = await openHandleStore();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction("handles", "readonly");
        const request = transaction.objectStore("handles").get(key);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
    }

    async function requestDirectoryPermission(handle, mode = "readwrite", promptUser = true) {
      const options = { mode };
      if ((await handle.queryPermission(options)) === "granted") return true;
      if (!promptUser) return false;
      return (await handle.requestPermission(options)) === "granted";
    }

    async function getProjectDirectory(promptUser = true) {
      if (projectDirectoryHandle && await requestDirectoryPermission(projectDirectoryHandle, "readwrite", promptUser)) return projectDirectoryHandle;

      const stored = await getStoredHandle("projectDirectory");
      if (stored && await requestDirectoryPermission(stored, "readwrite", promptUser)) {
        projectDirectoryHandle = stored;
        return projectDirectoryHandle;
      }

      if (!promptUser) return null;

      if (!("showDirectoryPicker" in window)) {
        alert("当前浏览器不支持直接保存到项目文件夹。请使用最新版 Chrome 或 Edge 打开这个页面。");
        return null;
      }

      const handle = await window.showDirectoryPicker({ mode: "readwrite" });
      if (!(await requestDirectoryPermission(handle))) {
        alert("没有获得文件夹写入权限。");
        return null;
      }

      projectDirectoryHandle = handle;
      await saveStoredHandle("projectDirectory", handle);
      status.textContent = "已绑定项目文件夹";
      return projectDirectoryHandle;
    }

    async function findLatestVersionHandle(directoryHandle) {
      let latest = null;
      for await (const [name, handle] of directoryHandle.entries()) {
        if (handle.kind !== "file" || !isVersionFileName(name)) continue;
        if (!latest || name > latest.name) latest = { name, handle };
      }
      return latest;
    }

    async function loadLatestVersionFromDirectory(promptUser = false) {
      try {
        const directoryHandle = await getProjectDirectory(promptUser);
        if (!directoryHandle) return false;

        const latest = await findLatestVersionHandle(directoryHandle);
        if (!latest) {
          if (promptUser) status.textContent = "项目文件夹里还没有保存过的新版本文件";
          return false;
        }

        const file = await latest.handle.getFile();
        data = mergeWithDefaults(parseEmbeddedData(await file.text()));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        activeId = data[0].id;
        render();
        status.textContent = `已读取最新版本：${latest.name}`;
        return true;
      } catch (error) {
        if (error?.name === "AbortError") return false;
        console.error(error);
        if (promptUser) alert(`读取最新版本失败：${error.message || error}`);
        return false;
      }
    }

    async function requestWritePermission(handle) {
      const options = { mode: "readwrite" };
      if ((await handle.queryPermission(options)) === "granted") return true;
      return (await handle.requestPermission(options)) === "granted";
    }

    async function saveToSourceFile() {
      try {
        saveData();

        if (!sourceFileHandle) {
          const selected = await chooseSourceFile();
          if (!selected) return;
        }

        if (!(await requestWritePermission(sourceFileHandle))) {
          alert("没有获得写入权限，文件没有保存。");
          return;
        }

        const file = await sourceFileHandle.getFile();
        const currentHtml = await file.text();
        const nextHtml = embedDataInHtml(currentHtml, data);
        const writable = await sourceFileHandle.createWritable();
        await writable.write(nextHtml);
        await writable.close();

        status.textContent = "已保存到 HTML 文件。现在可以用 GitHub Desktop 提交并推送。";
      } catch (error) {
        if (error?.name === "AbortError") return;
        console.error(error);
        alert(`保存失败：${error.message || error}`);
      }
    }

    async function saveNewVersionFile() {
      try {
        saveData();
        const directoryHandle = await getProjectDirectory(true);
        if (!directoryHandle) return;

        const fileName = createVersionFileName();
        const fileHandle = await directoryHandle.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(createEditableHtml(data));
        await writable.close();

        status.textContent = `已保存新版本：${fileName}。请用 GitHub Desktop 提交并推送。`;
      } catch (error) {
        if (error?.name === "AbortError") return;
        console.error(error);
        alert(`保存新版本失败：${error.message || error}`);
      }
    }

    function getEditableCellValue(cell) {
      return cell.innerText.replace(/\r\n/g, "\n").replace(/\n$/, "");
    }

    function insertEditableLineBreak() {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) return;
      const range = selection.getRangeAt(0);
      range.deleteContents();
      range.insertNode(document.createTextNode("\n"));
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function render() {

      sections.innerHTML = "";

      data.forEach((section) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "nav-button";
        button.textContent = section.title;
        button.dataset.id = section.id;
        button.addEventListener("click", () => switchSection(section.id));
        nav.appendChild(button);

        const block = document.createElement("section");
        block.className = "section";
        block.dataset.id = section.id;

        if (section.id === "roadmap") block.appendChild(createMonthTimeline(section));

        if (section.id === "monthly-okr") {
          block.appendChild(createOkrBoard(section));
        } else if (section.id === "weekly") {
          block.appendChild(createWeeklyBoard(section));
        } else {
          block.appendChild(createEditableTable(section, getVisibleRows(section), (rowIndex, cellIndex, value) => {
            data.find((item) => item.id === section.id).rows[rowIndex][cellIndex] = value;
            saveData();
          }));
        }

        sections.appendChild(block);
      });

      switchSection(activeId);
    }

    function createOkrBoard(section) {
      const board = document.createElement("div");
      board.className = "okr-board";
      groupOkrRows(section.rows).forEach((monthGroup) => {
        const monthBlock = document.createElement("div");
        monthBlock.className = "okr-month";

        const monthHeader = document.createElement("div");
        monthHeader.className = "okr-month-header";
        const monthTitle = createOkrEditableCell(monthGroup.month, (value) => {
          monthGroup.rows.forEach(({ index }) => {
            section.rows[index][0] = value;
          });
          okrCollapsedMonths[value] = okrCollapsedMonths[monthGroup.month] || false;
          delete okrCollapsedMonths[monthGroup.month];
          saveData();
          render();
          switchSection("monthly-okr");
        });
        monthTitle.className = "okr-month-title";
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "okr-toggle";
        toggle.textContent = okrCollapsedMonths[monthGroup.month] ? "展开" : "收缩";
        toggle.addEventListener("click", () => {
          okrCollapsedMonths[monthGroup.month] = !okrCollapsedMonths[monthGroup.month];
          render();
          switchSection("monthly-okr");
        });
        monthHeader.appendChild(monthTitle);
        monthHeader.appendChild(toggle);
        monthBlock.appendChild(monthHeader);

        if (!okrCollapsedMonths[monthGroup.month]) monthGroup.objectives.forEach((objectiveGroup) => {
          const objectiveBlock = document.createElement("div");
          objectiveBlock.className = "okr-objective";

          const objectiveTitle = createOkrEditableCell(objectiveGroup.objective, (value) => {
            objectiveGroup.rows.forEach(({ index }) => {
              section.rows[index][1] = value;
            });
            saveData();
            render();
            switchSection("monthly-okr");
          });
          objectiveTitle.className = "okr-objective-title";
          objectiveBlock.appendChild(objectiveTitle);

          const krList = document.createElement("div");
          krList.className = "okr-kr-list";
          const krHeader = document.createElement("div");
          krHeader.className = "okr-kr-header";
          ["关键结果 KR", "衡量方式", "责任人", "权重", "进度", "备注", "操作"].forEach((label) => {
            const item = document.createElement("div");
            item.textContent = label;
            krHeader.appendChild(item);
          });
          krList.appendChild(krHeader);
          objectiveGroup.rows.forEach(({ row, index }) => {
            const kr = document.createElement("div");
            kr.className = "okr-kr-row";
            [
              [2],
              [3],
              [4],
              [5],
              [6],
              [7]
            ].forEach(([cellIndex]) => {
              const field = document.createElement("div");
              const cell = createOkrEditableCell(row[cellIndex] || "", (value) => {
                section.rows[index][cellIndex] = value;
                saveData();
              });
              cell.classList.add("okr-cell");
              field.appendChild(cell);
              kr.appendChild(field);
            });
            const actionField = document.createElement("div");
            actionField.className = "row-delete-cell";
            const deleteButton = document.createElement("button");
            deleteButton.type = "button";
            deleteButton.className = "row-delete-button";
            deleteButton.textContent = "删除此行";
            deleteButton.addEventListener("click", () => {
              if (!confirm("确认删除这条 OKR？")) return;
              section.rows.splice(index, 1);
              saveData();
              render();
              switchSection("monthly-okr");
            });
            actionField.appendChild(deleteButton);
            kr.appendChild(actionField);
            krList.appendChild(kr);
          });
          objectiveBlock.appendChild(krList);

          const addKrWrap = document.createElement("div");
          addKrWrap.className = "okr-add-kr-wrap";
          const addKrButton = document.createElement("button");
          addKrButton.type = "button";
          addKrButton.className = "okr-add-kr-button";
          addKrButton.textContent = "新增 KR";
          addKrButton.addEventListener("click", () => {
            const insertIndex = Math.max(...objectiveGroup.rows.map(({ index }) => index)) + 1;
            section.rows.splice(insertIndex, 0, createKrRowForObjective(monthGroup.month, objectiveGroup.objective));
            saveData();
            render();
            switchSection("monthly-okr");
          });
          addKrWrap.appendChild(addKrButton);
          objectiveBlock.appendChild(addKrWrap);
          monthBlock.appendChild(objectiveBlock);
        });

        board.appendChild(monthBlock);
      });
      return board;
    }

    function createKrRowForObjective(month, objective) {
      return [
        month,
        objective,
        "KR：新增关键结果",
        "填写衡量方式",
        inferOkrOwner(objective),
        "0%",
        "0%",
        ""
      ];
    }

    function inferOkrOwner(objective) {
      const text = String(objective || "");
      if (text.includes("产品")) return "产品";
      if (text.includes("运营")) return "运营";
      if (text.includes("市场")) return "市场";
      if (text.includes("技术")) return "技术";
      return "待定";
    }

    function createOkrEditableCell(value, onChange) {
      const cell = document.createElement("div");
      cell.contentEditable = "true";
      cell.textContent = value || "";
      cell.addEventListener("blur", () => onChange(cell.textContent));
      return cell;
    }

    function createWeeklyBoard(section) {
      const board = document.createElement("div");
      board.className = "weekly-board";
      groupWeeklyRows(section.rows).forEach((weekGroup) => {
        const card = document.createElement("div");
        card.className = "weekly-card";

        const header = document.createElement("div");
        header.className = "weekly-header";
        const weekTitle = createWeeklyEditableCell(weekGroup.week, (value) => {
          weekGroup.rows.forEach(({ index }) => {
            section.rows[index][0] = value;
          });
          saveData();
          render();
          switchSection("weekly");
        });
        weekTitle.className = "weekly-title";
        const weekGoal = createWeeklyEditableCell(weekGroup.goal, (value) => {
          weekGroup.rows.forEach(({ index }) => {
            section.rows[index][1] = value;
          });
          saveData();
        });
        weekGoal.className = "weekly-goal";
        header.appendChild(weekTitle);
        header.appendChild(weekGoal);
        card.appendChild(header);

        const tableWrap = document.createElement("div");
        tableWrap.className = "table-wrap";
        const table = document.createElement("table");
        table.className = "weekly-table";
        const displayColumns = [
          [2, "任务类型"],
          [3, "任务"],
          [4, "负责人"],
          [5, "优先级"],
          [6, "预期结果"],
          [7, "完成情况"],
          [8, "遇见问题"]
        ];
        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");
        displayColumns.forEach(([, label]) => {
          const th = document.createElement("th");
          th.textContent = label;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        weekGroup.rows.forEach(({ row, index }) => {
          const tr = document.createElement("tr");
          displayColumns.forEach(([cellIndex]) => {
            const td = document.createElement("td");
            const cell = createWeeklyEditableCell(row[cellIndex] || "", (value) => {
              section.rows[index][cellIndex] = value;
              saveData();
            });
            cell.className = "weekly-cell";
            td.appendChild(cell);
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        tableWrap.appendChild(table);
        card.appendChild(tableWrap);
        board.appendChild(card);
      });
      return board;
    }

    function createWeeklyEditableCell(value, onChange) {
      const cell = document.createElement("div");
      cell.contentEditable = "true";
      cell.textContent = value || "";
      cell.addEventListener("blur", () => onChange(cell.textContent));
      return cell;
    }

    function groupWeeklyRows(rows) {
      const groups = [];
      rows.forEach((row, index) => {
        const week = row[0] || "未填写周次";
        let group = groups.find((item) => item.week === week);
        if (!group) {
          group = { week, goal: row[1] || "未填写周目标", rows: [] };
          groups.push(group);
        }
        group.rows.push({ row, index });
      });
      return groups.sort((a, b) => compareWeekText(b.week, a.week));
    }

    function groupOkrRows(rows) {
      const months = [];
      rows.forEach((row, index) => {
        const month = row[0] || "未填写月份";
        let monthGroup = months.find((item) => item.month === month);
        if (!monthGroup) {
          monthGroup = { month, rows: [], objectives: [] };
          months.push(monthGroup);
        }
        monthGroup.rows.push({ row, index });

        const objective = row[1] || "未填写目标 O";
        let objectiveGroup = monthGroup.objectives.find((item) => item.objective === objective);
        if (!objectiveGroup) {
          objectiveGroup = { objective, rows: [] };
          monthGroup.objectives.push(objectiveGroup);
        }
        objectiveGroup.rows.push({ row, index });
      });
      return months.sort((a, b) => compareOkrMonthText(b.month, a.month));
    }

    function compareOkrMonthText(a, b) {
      const dateA = parseMonthText(a);
      const dateB = parseMonthText(b);
      if (dateA && dateB) return (dateA.year * 12 + dateA.month) - (dateB.year * 12 + dateB.month);
      const numberA = parseOkrMonthNumber(a);
      const numberB = parseOkrMonthNumber(b);
      if (numberA && numberB) return numberA - numberB;
      return String(a || "").localeCompare(String(b || ""), "zh-CN");
    }

    function getFilterOptions(section, header) {
      const index = section.headers.indexOf(header);
      const values = section.rows.map((row) => row[index]).filter(Boolean);
      return ["全部", ...Array.from(new Set(values))];
    }

    function getVisibleRows(section) {
      if (section.id === "roadmap") {
        return section.rows
          .map((row, index) => ({ row, index }))
          .sort((a, b) => compareMonthText(b.row[0], a.row[0]) || b.index - a.index);
      }

      if (section.id !== "backlog") {
        return section.rows.map((row, index) => ({ row, index }));
      }

      const ownershipIndex = section.headers.indexOf("归属");
      const ownerIndex = section.headers.indexOf("负责人");
      const statusIndex = section.headers.indexOf("状态");
      return section.rows
        .map((row, index) => ({ row, index }))
        .filter(({ row }) => (
          (backlogFilters.ownership === "全部" || row[ownershipIndex] === backlogFilters.ownership) &&
          (backlogFilters.owner === "全部" || row[ownerIndex] === backlogFilters.owner) &&
          (backlogFilters.status === "全部" || row[statusIndex] === backlogFilters.status)
        ));
    }

    function createEditableTable(section, visibleRows, onChange) {
      const { headers } = section;
      const tableWrap = document.createElement("div");
      tableWrap.className = "table-wrap";

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      const canDeleteRows = supportsInlineRowDelete(section);
      headers.forEach((header) => {
        const th = document.createElement("th");
        if (isBacklogFilterHeader(section, header)) {
          th.appendChild(createBacklogHeaderFilter(section, header));
        } else {
          th.textContent = header;
        }
        headerRow.appendChild(th);
      });
      if (canDeleteRows) {
        const th = document.createElement("th");
        th.className = "row-delete-cell";
        th.textContent = "操作";
        headerRow.appendChild(th);
      }
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      visibleRows.forEach(({ row, index: rowIndex }) => {
        const tr = document.createElement("tr");
        headers.forEach((_, cellIndex) => {
          const td = document.createElement("td");
          if (isBacklogOwnershipCell(section, cellIndex)) {
            td.appendChild(createCellSelect(BACKLOG_OWNERSHIP_OPTIONS, row[cellIndex], "产品", (value) => onChange(rowIndex, cellIndex, value)));
          } else if (isBacklogStatusCell(section, cellIndex)) {
            td.appendChild(createCellSelect(BACKLOG_STATUS_OPTIONS, row[cellIndex], "未开始", (value) => onChange(rowIndex, cellIndex, value)));
          } else {
            td.contentEditable = "true";
            td.textContent = row[cellIndex] || "";
            td.addEventListener("keydown", (event) => {
              if (event.key === "Enter") {
                event.preventDefault();
                insertEditableLineBreak();
                onChange(rowIndex, cellIndex, getEditableCellValue(td));
              }
            });
            td.addEventListener("input", () => onChange(rowIndex, cellIndex, getEditableCellValue(td)));
          }
          tr.appendChild(td);
        });
        if (canDeleteRows) {
          const td = document.createElement("td");
          td.className = "row-delete-cell";
          const button = document.createElement("button");
          button.type = "button";
          button.className = "row-delete-button";
          button.textContent = "删除此行";
          button.addEventListener("click", () => {
            if (!confirm("确认删除此行？")) return;
            section.rows.splice(rowIndex, 1);
            saveData();
            render();
            switchSection(section.id);
          });
          td.appendChild(button);
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableWrap.appendChild(table);

      return tableWrap;
    }

    function supportsInlineRowDelete(section) {
      return ["backlog", "decisions"].includes(section.id);
    }

    function createBacklogHeaderFilter(section, header) {
      const wrap = document.createElement("div");
      wrap.className = "table-filter-header";
      const label = document.createElement("span");
      label.className = "table-filter-label";
      label.textContent = header;
      const select = document.createElement("select");
      select.className = "filter-select";
      select.title = `筛选${header}`;
      const key = getBacklogFilterKey(header);
      const options = header === "归属" ? ["全部", ...BACKLOG_OWNERSHIP_OPTIONS] : getFilterOptions(section, header);
      options.forEach((option) => {
        const item = document.createElement("option");
        item.value = option;
        item.textContent = option === "全部" ? "▽" : option;
        select.appendChild(item);
      });
      select.value = backlogFilters[key];
      select.addEventListener("change", () => {
        backlogFilters[key] = select.value;
        render();
        switchSection("backlog");
      });
      wrap.appendChild(label);
      wrap.appendChild(select);
      return wrap;
    }

    function createCellSelect(options, value, fallback, onChange) {
      const select = document.createElement("select");
      select.className = "cell-select";
      options.forEach((option) => {
        const item = document.createElement("option");
        item.value = option;
        item.textContent = option;
        select.appendChild(item);
      });
      select.value = options.includes(value) ? value : fallback;
      select.addEventListener("change", () => onChange(select.value));
      return select;
    }

    function isBacklogFilterHeader(section, header) {
      return section.id === "backlog" && ["归属", "负责人", "状态"].includes(header);
    }

    function getBacklogFilterKey(header) {
      if (header === "归属") return "ownership";
      if (header === "负责人") return "owner";
      return "status";
    }

    function isBacklogOwnershipCell(section, cellIndex) {
      return section.id === "backlog" && section.headers[cellIndex] === "归属";
    }

    function isBacklogStatusCell(section, cellIndex) {
      return section.id === "backlog" && section.headers[cellIndex] === "状态";
    }

    function getRowsByMonthDesc(rows) {
      return rows
        .map((row, index) => ({ row, index }))
        .sort((a, b) => compareMonthText(b.row[0], a.row[0]) || b.index - a.index)
        .map(({ row }) => row);
    }

    function compareMonthText(a, b) {
      const dateA = parseMonthText(a);
      const dateB = parseMonthText(b);
      if (dateA && dateB) return (dateA.year * 12 + dateA.month) - (dateB.year * 12 + dateB.month);
      return String(a || "").localeCompare(String(b || ""), "zh-CN");
    }

    function inferBacklogOwnership(moduleName) {
      if (["运营", "文档"].includes(moduleName)) return "运营";
      if (["调研"].includes(moduleName)) return "市场";
      if (["设计"].includes(moduleName)) return "前端";
      if (["技术", "开发"].includes(moduleName)) return "后端";
      if (["测试"].includes(moduleName)) return "测试";
      return "产品";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function switchSection(id) {
      activeId = id;
      const section = data.find((item) => item.id === id);
      pageTitle.textContent = section.title;
      pageDescription.textContent = section.description;
      document.querySelectorAll(".nav-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.id === id);
      });
      document.querySelectorAll(".section").forEach((block) => {
        block.classList.toggle("active", block.dataset.id === id);
      });
      const isRoadmap = id === "roadmap";
      const isOkr = id === "monthly-okr";
      const isWeekly = id === "weekly";
      addRowButton.style.display = isRoadmap || isOkr ? "none" : "inline-block";
      deleteRowButton.style.display = isRoadmap || isOkr ? "none" : "inline-block";
      addMonthButton.style.display = isRoadmap ? "inline-block" : "none";
      deleteMonthButton.style.display = isRoadmap ? "inline-block" : "none";
      addWeekButton.style.display = isWeekly ? "inline-block" : "none";
      deleteWeekButton.style.display = isWeekly ? "inline-block" : "none";
      addOkrMonthButton.style.display = isOkr ? "inline-block" : "none";
      deleteOkrMonthButton.style.display = isOkr ? "inline-block" : "none";
      addObjectiveButton.style.display = isOkr ? "inline-block" : "none";
      deleteObjectiveButton.style.display = isOkr ? "inline-block" : "none";
      addKrButton.style.display = isOkr ? "inline-block" : "none";
      deleteKrButton.style.display = isOkr ? "inline-block" : "none";
    }

    addRowButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === activeId);
      if (section.id === "backlog") {
        section.rows.push(section.headers.map((header) => {
          if (header === "归属") return "产品";
          if (header === "状态") return "未开始";
          return "";
        }));
      } else if (section.id === "weekly") {
        section.rows.push(createWeeklyTaskRow(section.rows));
      } else {
        section.rows.push(section.headers.map(() => ""));
      }
      saveData();
      render();
    });

    deleteRowButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === activeId);
      if (!section || section.rows.length === 0) return;
      if (!confirm("确认减去当前表格最后一行？")) return;
      section.rows.pop();
      saveData();
      render();
      switchSection(activeId);
    });

    addMonthButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "roadmap");
      section.rows.push(createNextMonthPlanRow(section.rows));
      saveData();
      render();
      switchSection("roadmap");
    });

    deleteMonthButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "roadmap");
      if (!section || section.rows.length === 0) return;
      const latestMonth = getLatestMonthText(section.rows);
      if (!confirm(`确认删除 ${latestMonth}？`)) return;
      section.rows = section.rows.filter((row) => row[0] !== latestMonth);
      saveData();
      render();
      switchSection("roadmap");
    });

    addWeekButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "weekly");
      const nextRows = createNextWeekRows(section.rows);
      section.rows.push(...nextRows);
      saveData();
      render();
      switchSection("weekly");
    });

    deleteWeekButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "weekly");
      if (!section || section.rows.length === 0) return;
      const targetWeek = getLatestWeekText(section.rows);
      if (!confirm(`确认删除 ${targetWeek} 及其全部任务？`)) return;
      section.rows = section.rows.filter((row) => row[0] !== targetWeek);
      saveData();
      render();
      switchSection("weekly");
    });

    addOkrMonthButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "monthly-okr");
      section.rows.push(createNextOkrMonthRow(section.rows));
      saveData();
      render();
      switchSection("monthly-okr");
    });

    deleteOkrMonthButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "monthly-okr");
      if (!section || section.rows.length === 0) return;
      const latestMonth = getLatestOkrMonthText(section.rows);
      if (!confirm(`确认删减 ${latestMonth} 及其全部 O/KR？`)) return;
      section.rows = section.rows.filter((row) => row[0] !== latestMonth);
      saveData();
      render();
      switchSection("monthly-okr");
    });

    addObjectiveButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "monthly-okr");
      section.rows.push(createNextObjectiveRow(section.rows));
      saveData();
      render();
      switchSection("monthly-okr");
    });

    deleteObjectiveButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "monthly-okr");
      if (!section || section.rows.length === 0) return;
      const lastMonth = getLatestOkrMonthText(section.rows);
      const lastObjective = getLatestObjectiveText(section.rows, lastMonth);
      if (!confirm(`确认删减 ${lastMonth} 的 ${lastObjective} 及其全部 KR？`)) return;
      section.rows = section.rows.filter((row) => !(row[0] === lastMonth && row[1] === lastObjective));
      saveData();
      render();
      switchSection("monthly-okr");
    });

    addKrButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "monthly-okr");
      section.rows.push(createNextKrRow(section.rows));
      saveData();
      render();
      switchSection("monthly-okr");
    });

    deleteKrButton.addEventListener("click", () => {
      const section = data.find((item) => item.id === "monthly-okr");
      if (!section || section.rows.length === 0) return;
      if (!confirm("确认删减最后一个 KR？")) return;
      const latestMonth = getLatestOkrMonthText(section.rows);
      const latestObjective = getLatestObjectiveText(section.rows, latestMonth);
      for (let index = section.rows.length - 1; index >= 0; index -= 1) {
        if (section.rows[index][0] === latestMonth && section.rows[index][1] === latestObjective) {
          section.rows.splice(index, 1);
          break;
        }
      }
      saveData();
      render();
      switchSection("monthly-okr");
    });

    function createNextMonthPlanRow(rows) {
      const monthText = getNextMonthText(rows);
      return [monthText, "填写阶段", "填写本月目标", "填写本月重点任务", "填写预期成果", "未开始", ""];
    }

    function createNextWeekRows(rows) {
      const weekText = getNextWeekText(rows);
      return [
        [weekText, "填写本周目标", "产品规划", "填写任务", "待定", "高", "周五", "填写预期结果", "未开始", ""],
        [weekText, "填写本周目标", "执行推进", "填写任务", "待定", "中", "周五", "填写预期结果", "未开始", ""],
        [weekText, "填写本周目标", "复盘检查", "填写任务", "待定", "中", "周五", "填写预期结果", "未开始", ""]
      ];
    }

    function createWeeklyTaskRow(rows) {
      const weekText = getLatestWeekText(rows);
      const latestWeekRows = rows.filter((row) => row[0] === weekText);
      const weekGoal = latestWeekRows[0]?.[1] || "填写本周目标";
      return [weekText, weekGoal, "执行推进", "填写任务", "待定", "中", "周五", "填写预期结果", "未开始", ""];
    }

    function createNextOkrMonthRow(rows) {
      const monthText = getNextOkrMonthText(rows);
      okrCollapsedMonths[monthText] = false;
      return [monthText, "O1：填写本月目标", "KR1：填写关键结果", "填写衡量方式", "待定", "0%", "0%", ""];
    }

    function createNextObjectiveRow(rows) {
      const monthText = getLatestOkrMonthText(rows);
      const nextObjectiveNumber = getNextObjectiveNumber(rows, monthText);
      okrCollapsedMonths[monthText] = false;
      return [monthText, `O${nextObjectiveNumber}：填写目标`, "KR1：填写关键结果", "填写衡量方式", "待定", "0%", "0%", ""];
    }

    function createNextKrRow(rows) {
      const monthText = getLatestOkrMonthText(rows);
      const objectiveText = getLatestObjectiveText(rows, monthText);
      const nextKrNumber = getNextKrNumber(rows, monthText, objectiveText);
      okrCollapsedMonths[monthText] = false;
      return [monthText, objectiveText, `KR${nextKrNumber}：填写关键结果`, "填写衡量方式", "待定", "0%", "0%", ""];
    }

    function getNextOkrMonthText(rows) {
      const monthValues = rows.map((row) => parseMonthText(row[0])).filter(Boolean);
      if (monthValues.length) {
        const lastMonth = monthValues.reduce((latest, item) => (
          item.year * 12 + item.month > latest.year * 12 + latest.month ? item : latest
        ));
        const date = new Date(lastMonth.year, lastMonth.month, 1);
        return `${date.getFullYear()}年${date.getMonth() + 1}月`;
      }
      const monthNumbers = rows.map((row) => parseOkrMonthNumber(row[0])).filter(Boolean);
      const lastNumber = monthNumbers.length ? Math.max(...monthNumbers) : 0;
      return `第 ${lastNumber + 1} 月`;
    }

    function getLatestOkrMonthText(rows) {
      if (!rows.length) return "第 1 月";
      return groupOkrRows(rows)[0]?.month || "第 1 月";
    }

    function getLatestObjectiveText(rows, monthText) {
      const groups = groupOkrRows(rows);
      const monthGroup = groups.find((group) => group.month === monthText);
      return monthGroup?.objectives[monthGroup.objectives.length - 1]?.objective || "O1：填写目标";
    }

    function parseOkrMonthNumber(value) {
      const match = String(value || "").match(/第\s*(\d+)\s*月/);
      return match ? Number(match[1]) : null;
    }

    function getNextObjectiveNumber(rows, monthText) {
      const numbers = rows
        .filter((row) => row[0] === monthText)
        .map((row) => String(row[1] || "").match(/^O(\d+)/))
        .filter(Boolean)
        .map((match) => Number(match[1]));
      return numbers.length ? Math.max(...numbers) + 1 : 1;
    }

    function getNextKrNumber(rows, monthText, objectiveText) {
      const numbers = rows
        .filter((row) => row[0] === monthText && row[1] === objectiveText)
        .map((row) => String(row[2] || "").match(/^KR(\d+)/))
        .filter(Boolean)
        .map((match) => Number(match[1]));
      return numbers.length ? Math.max(...numbers) + 1 : 1;
    }

    function getNextMonthText(rows) {
      const monthValues = rows.map((row) => parseMonthText(row[0])).filter(Boolean);
      const base = monthValues.length
        ? monthValues.reduce((latest, item) => (
            item.year * 12 + item.month > latest.year * 12 + latest.month ? item : latest
          ))
        : { year: 2026, month: 6 };
      const date = new Date(base.year, base.month, 1);
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function getLatestMonthText(rows) {
      const monthValues = rows
        .map((row) => ({ text: row[0], parsed: parseMonthText(row[0]) }))
        .filter((item) => item.parsed);
      if (!monthValues.length) return rows[rows.length - 1]?.[0] || "";
      return monthValues.reduce((latest, item) => (
        item.parsed.year * 12 + item.parsed.month > latest.parsed.year * 12 + latest.parsed.month ? item : latest
      )).text;
    }

    function parseMonthText(value) {
      const match = String(value || "").match(/(\d{4})年(\d{1,2})月/);
      if (!match) return null;
      return { year: Number(match[1]), month: Number(match[2]) };
    }

    function getNextWeekText(rows) {
      const numbers = rows.map((row) => parseWeekNumber(row[0])).filter(Boolean);
      const latest = numbers.length ? Math.max(...numbers) : 0;
      return `第 ${latest + 1} 周`;
    }

    function getLatestWeekText(rows) {
      if (!rows.length) return "第 1 周";
      const groups = groupWeeklyRows(rows);
      return groups[0]?.week || rows[rows.length - 1][0] || "第 1 周";
    }

    function compareWeekText(a, b) {
      const numberA = parseWeekNumber(a);
      const numberB = parseWeekNumber(b);
      if (numberA && numberB) return numberA - numberB;
      return String(a || "").localeCompare(String(b || ""), "zh-CN");
    }

    function parseWeekNumber(value) {
      const match = String(value || "").match(/第\s*(\d+)\s*周/);
      return match ? Number(match[1]) : null;
    }

    function normalizeWeeklyRows(section) {
      const defaultHeaders = defaultData.find((item) => item.id === "weekly").headers;
      if (arraysEqual(section.headers, defaultHeaders)) return section.rows.map((row) => [...row]);

      const statusIndex = section.headers.indexOf("状态");
      const completionIndex = section.headers.indexOf("完成情况");
      return section.rows.map((row) => [
        row[section.headers.indexOf("周次")] || "第 1 周",
        row[section.headers.indexOf("目标")] || row[section.headers.indexOf("周目标")] || "填写本周目标",
        row[section.headers.indexOf("任务类型")] || "执行推进",
        row[section.headers.indexOf("任务")] || "",
        row[section.headers.indexOf("负责人")] || "待定",
        row[section.headers.indexOf("优先级")] || "中",
        row[section.headers.indexOf("预期结果")] || "",
        row[completionIndex !== -1 ? completionIndex : statusIndex] || "未开始",
        row[section.headers.indexOf("遇见问题")] || ""
      ]);
    }

    function normalizeRoadmapRows(section) {
      const monthIndex = section.headers.indexOf("月份");
      const phaseIndex = section.headers.indexOf("阶段");
      const goalIndex = section.headers.indexOf("本月目标");
      const taskIndex = section.headers.indexOf("重点任务");
      const outcomeIndex = section.headers.indexOf("预期成果");
      const statusIndex = section.headers.indexOf("状态");
      const notesIndex = section.headers.indexOf("备注");

      return section.rows.map((row) => [
        row[monthIndex] || "",
        row[phaseIndex] || "",
        row[goalIndex] || "",
        row[taskIndex] || "",
        row[outcomeIndex] || "",
        row[statusIndex] || "未开始",
        row[notesIndex] || ""
      ]);
    }

    function removeLegacyOkrSummaryRows(rows) {
      return rows.filter((row) => {
        const text = row.join(" ");
        return !(text.includes("产品功能快速闭环") && text.includes("种子用户内测验证"));
      });
    }

    function arraysEqual(a, b) {
      return Array.isArray(a) && Array.isArray(b) && a.length === b.length && a.every((value, index) => value === b[index]);
    }

    document.getElementById("resetButton").addEventListener("click", () => {
      if (!confirm("确认恢复默认内容？当前浏览器保存的修改会被清除。")) return;
      data = orderSections(structuredClone(defaultData));
      localStorage.removeItem(STORAGE_KEY);
      activeId = data[0].id;
      render();
      status.textContent = "已恢复默认内容";
    });

    document.getElementById("pickSourceButton").addEventListener("click", () => {
      getProjectDirectory(true).then(() => loadLatestVersionFromDirectory(false)).catch((error) => {
        if (error?.name === "AbortError") return;
        console.error(error);
        alert(`绑定项目文件夹失败：${error.message || error}`);
      });
    });

    document.getElementById("saveSourceButton").addEventListener("click", () => {
      saveNewVersionFile();
    });

    function createReadOnlyHtml(exportData) {
      const safeData = JSON.stringify(exportData).replace(/<\/script/gi, "<\\/script");
      return `<!doctype html>

<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>1mod</h1>
        <p>项目管理查看版</p>
      </div>
      <nav id="nav"></nav>
    </aside>
    <main>
      <div class="topbar">
        <h2 id="pageTitle"></h2>
        <p id="pageDescription"></p>
      </div>
      <div id="sections"></div>
      <div class="hint">此文件为只读查看版，不支持编辑。</div>
    </main>
  </div>
  <script>
    const data = ${safeData};
    let activeId = data[0].id;
    const okrCollapsedMonths = {};
    const nav = document.getElementById("nav");
    const sections = document.getElementById("sections");
    const pageTitle = document.getElementById("pageTitle");
    const pageDescription = document.getElementById("pageDescription");

    function render() {
      nav.innerHTML = "";
      sections.innerHTML = "";

      data.forEach((section) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "nav-button";
        button.textContent = section.title;
        button.dataset.id = section.id;
        button.addEventListener("click", () => switchSection(section.id));
        nav.appendChild(button);

        const block = document.createElement("section");
        block.className = "section";
        block.dataset.id = section.id;

        if (section.id === "roadmap") {
          block.appendChild(createMonthTimeline(section));
          block.appendChild(createReadOnlyTable(section.headers, getRowsByMonthDesc(section.rows)));
        } else if (section.id === "monthly-okr") {
          block.appendChild(createReadOnlyOkrBoard(section));
        } else if (section.id === "weekly") {
          block.appendChild(createReadOnlyWeeklyBoard(section));
        } else {
          block.appendChild(createReadOnlyTable(section.headers, section.id === "roadmap" ? getRowsByMonthDesc(section.rows) : section.rows));
        }

        sections.appendChild(block);
      });

      switchSection(activeId);
    }

    function createMonthTimeline(section) {
      const wrap = document.createElement("div");
      wrap.className = "month-timeline";
      getRowsByMonthDesc(section.rows).forEach((row) => {
        const item = document.createElement("div");
        item.className = "timeline-item";
        item.innerHTML = \`
          <div class="timeline-meta">
            \${escapeHtml(row[0] || "")}
            <span class="timeline-status">\${escapeHtml(row[5] || "未开始")}</span>
          </div>
          <div class="timeline-card">
            <div class="timeline-title">\${escapeHtml(row[2] || "")}</div>
            <div class="timeline-text">\${escapeHtml(row[3] || "")}</div>
            <div class="timeline-text">预期成果：\${escapeHtml(row[4] || "")}</div>
          </div>
        \`;
        wrap.appendChild(item);
      });
      return wrap;
    }

    function getRowsByMonthDesc(rows) {
      return rows
        .map((row, index) => ({ row, index }))
        .sort((a, b) => compareMonthText(b.row[0], a.row[0]) || b.index - a.index)
        .map(({ row }) => row);
    }

    function compareMonthText(a, b) {
      const dateA = parseMonthText(a);
      const dateB = parseMonthText(b);
      if (dateA && dateB) return (dateA.year * 12 + dateA.month) - (dateB.year * 12 + dateB.month);
      return String(a || "").localeCompare(String(b || ""), "zh-CN");
    }

    function parseMonthText(value) {
      const match = String(value || "").match(/(\\d{4})年(\\d{1,2})月/);
      if (!match) return null;
      return { year: Number(match[1]), month: Number(match[2]) };
    }

    function createReadOnlyOkrBoard(section) {
      const board = document.createElement("div");
      board.className = "okr-board";
      const defaultOpenMonth = getDefaultOpenOkrMonth(section.rows);
      groupOkrRows(section.rows).forEach((monthGroup) => {
        const isCollapsed = isOkrMonthCollapsed(monthGroup.month, defaultOpenMonth);
        const monthBlock = document.createElement("div");
        monthBlock.className = "okr-month";
        monthBlock.classList.toggle("collapsed", isCollapsed);
        const monthHeader = document.createElement("div");
        monthHeader.className = "okr-month-header";
        const monthTitle = document.createElement("div");
        monthTitle.className = "okr-month-title";
        monthTitle.textContent = monthGroup.month;
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "okr-toggle";
        toggle.textContent = isCollapsed ? "展开" : "收缩";
        toggle.addEventListener("click", () => {
          okrCollapsedMonths[monthGroup.month] = !isOkrMonthCollapsed(monthGroup.month, defaultOpenMonth);
          render();
          switchSection("monthly-okr");
        });
        monthHeader.appendChild(monthTitle);
        monthHeader.appendChild(toggle);
        monthBlock.appendChild(monthHeader);

        if (!isCollapsed) monthGroup.objectives.forEach((objectiveGroup) => {
          const objectiveBlock = document.createElement("div");
          objectiveBlock.className = "okr-objective";
          const objectiveTitle = document.createElement("div");
          objectiveTitle.className = "okr-objective-title";
          objectiveTitle.textContent = objectiveGroup.objective;
          objectiveBlock.appendChild(objectiveTitle);

          const krList = document.createElement("div");
          krList.className = "okr-kr-list";
          const krHeader = document.createElement("div");
          krHeader.className = "okr-kr-header";
          ["关键结果 KR", "衡量方式", "责任人", "权重", "进度", "备注"].forEach((label) => {
            const item = document.createElement("div");
            item.textContent = label;
            krHeader.appendChild(item);
          });
          krList.appendChild(krHeader);
          objectiveGroup.rows.forEach(({ row }) => {
            const kr = document.createElement("div");
            kr.className = "okr-kr-row";
            [
              [2],
              [3],
              [4],
              [5],
              [6],
              [7]
            ].forEach(([cellIndex]) => {
              const field = document.createElement("div");
              const cell = document.createElement("div");
              cell.className = "okr-cell";
              cell.textContent = row[cellIndex] || "";
              field.appendChild(cell);
              kr.appendChild(field);
            });
            krList.appendChild(kr);
          });
          objectiveBlock.appendChild(krList);
          monthBlock.appendChild(objectiveBlock);
        });
        board.appendChild(monthBlock);
      });
      return board;
    }

    function isOkrMonthCollapsed(monthText, defaultOpenMonth) {
      if (Object.prototype.hasOwnProperty.call(okrCollapsedMonths, monthText)) return okrCollapsedMonths[monthText];
      return monthText !== defaultOpenMonth;
    }

    function getDefaultOpenOkrMonth(rows) {
      const monthGroups = groupOkrRows(rows);
      const currentMonth = monthGroups.find((group) => isCurrentOkrMonth(group.month));
      if (currentMonth) return currentMonth.month;
      const chronologicalMonths = monthGroups
        .map((group) => group.month)
        .sort((a, b) => compareOkrMonthText(a, b));
      return chronologicalMonths[0] || "";
    }

    function isCurrentOkrMonth(monthText) {
      const month = parseMonthText(monthText);
      if (!month) return false;
      const now = new Date();
      return month.year === now.getFullYear() && month.month === now.getMonth() + 1;
    }

    function createReadOnlyWeeklyBoard(section) {
      const board = document.createElement("div");
      board.className = "weekly-board";
      groupWeeklyRows(section.rows).forEach((weekGroup) => {
        const card = document.createElement("div");
        card.className = "weekly-card";

        const header = document.createElement("div");
        header.className = "weekly-header";
        const weekTitle = document.createElement("div");
        weekTitle.className = "weekly-title";
        weekTitle.textContent = weekGroup.week;
        const weekGoal = document.createElement("div");
        weekGoal.className = "weekly-goal";
        weekGoal.textContent = weekGroup.goal;
        header.appendChild(weekTitle);
        header.appendChild(weekGoal);
        card.appendChild(header);

        const tableWrap = document.createElement("div");
        tableWrap.className = "table-wrap";
        const table = document.createElement("table");
        table.className = "weekly-table";
        const columns = [
          [2, "任务类型"],
          [3, "任务"],
          [4, "负责人"],
          [5, "优先级"],
          [6, "预期结果"],
          [7, "完成情况"],
          [8, "遇见问题"]
        ];
        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");
        columns.forEach(([, label]) => {
          const th = document.createElement("th");
          th.textContent = label;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        weekGroup.rows.forEach(({ row }) => {
          const tr = document.createElement("tr");
          columns.forEach(([cellIndex]) => {
            const td = document.createElement("td");
            td.textContent = row[cellIndex] || "";
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        tableWrap.appendChild(table);
        card.appendChild(tableWrap);
        board.appendChild(card);
      });
      return board;
    }

    function groupOkrRows(rows) {
      const months = [];
      rows.forEach((row, index) => {
        const month = row[0] || "未填写月份";
        let monthGroup = months.find((item) => item.month === month);
        if (!monthGroup) {
          monthGroup = { month, rows: [], objectives: [] };
          months.push(monthGroup);
        }
        monthGroup.rows.push({ row, index });

        const objective = row[1] || "未填写目标 O";
        let objectiveGroup = monthGroup.objectives.find((item) => item.objective === objective);
        if (!objectiveGroup) {
          objectiveGroup = { objective, rows: [] };
          monthGroup.objectives.push(objectiveGroup);
        }
        objectiveGroup.rows.push({ row, index });
      });
      return months.sort((a, b) => compareOkrMonthText(b.month, a.month));
    }

    function compareOkrMonthText(a, b) {
      const dateA = parseMonthText(a);
      const dateB = parseMonthText(b);
      if (dateA && dateB) return (dateA.year * 12 + dateA.month) - (dateB.year * 12 + dateB.month);
      const numberA = parseOkrMonthNumber(a);
      const numberB = parseOkrMonthNumber(b);
      if (numberA && numberB) return numberA - numberB;
      return String(a || "").localeCompare(String(b || ""), "zh-CN");
    }

    function groupWeeklyRows(rows) {
      const groups = [];
      rows.forEach((row, index) => {
        const week = row[0] || "未填写周次";
        let group = groups.find((item) => item.week === week);
        if (!group) {
          group = { week, goal: row[1] || "未填写周目标", rows: [] };
          groups.push(group);
        }
        group.rows.push({ row, index });
      });
      return groups.sort((a, b) => compareWeekText(b.week, a.week));
    }

    function compareWeekText(a, b) {
      const numberA = parseWeekNumber(a);
      const numberB = parseWeekNumber(b);
      if (numberA && numberB) return numberA - numberB;
      return String(a || "").localeCompare(String(b || ""), "zh-CN");
    }

    function parseWeekNumber(value) {
      const match = String(value || "").match(/第\\s*(\\d+)\\s*周/);
      return match ? Number(match[1]) : null;
    }

    function parseMonthText(value) {
      const match = String(value || "").match(/(\\d{4})年(\\d{1,2})月/);
      if (!match) return null;
      return { year: Number(match[1]), month: Number(match[2]) };
    }

    function parseOkrMonthNumber(value) {
      const match = String(value || "").match(/第\\s*(\\d+)\\s*月/);
      return match ? Number(match[1]) : null;
    }

    function createReadOnlyTable(headers, rows) {
      const tableWrap = document.createElement("div");
      tableWrap.className = "table-wrap";
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      rows.forEach((row) => {
        const tr = document.createElement("tr");
        headers.forEach((_, cellIndex) => {
          const td = document.createElement("td");
          td.textContent = row[cellIndex] || "";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableWrap.appendChild(table);
      return tableWrap;
    }

    function switchSection(id) {
      activeId = id;
      const section = data.find((item) => item.id === id);
      pageTitle.textContent = section.title;
      pageDescription.textContent = section.description;
      document.querySelectorAll(".nav-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.id === id);
      });
      document.querySelectorAll(".section").forEach((block) => {
        block.classList.toggle("active", block.dataset.id === id);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    render();
  <\/script>
</body>
